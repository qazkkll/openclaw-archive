# ═══════════════════════════════════════════════════════════
# 🦅 Falcon 交易系统 — 主配置文件 (V0.4.6)
# 所有脚本读这个文件，不硬编码。
# ═══════════════════════════════════════════════════════════

system:
  name: "Falcon"
  version: "0.4.6"
  timezone: "US/Eastern"
  base_dir: "/home/hermes/.hermes/openclaw-archive"

# ── 模型层面 (选股逻辑) ──
model:
  name: "falcon_v046"
  universe: "SPX"
  universe_size: 476
  top_n: 10
  hold_days: 30
  stop_loss: -0.15
  cost_per_trade: 0.001

  # V0.4.6 因子权重 (IC加权, WF Sharpe=2.140)
  # 顶层: 等权不变; 底层: IC^0.5加权(lookback=126天)
  weights:
    fund_ratio: 0.45       # 财务比率 (20个因子, IC加权)
    growth_composite: 0.20 # 成长因子组合 (0.60*fund_growth + 0.25*analyst + 0.15*income)
    qoq: 0.20             # 季度环比变化 (4个因子, IC加权)
    cashflow: 0.15         # 现金流因子 (4个因子, IC加权)

  # growth_composite 子权重
  growth_composite_weights:
    fund_growth: 0.60      # 15个增长指标
    analyst: 0.25          # 4个分析师指标
    income: 0.15           # 6个收入指标

  features:
    fund_ratio: "FMP 财务比率 (20项): PE/PB/PS/利润率/周转率/负债率等 → 等权平均"
    growth_composite: "成长组合: 60%增长 + 25%分析师 + 15%收入"
    qoq: "季度环比 (4项): 毛利率/净利率/营业利润率/EBITDA利润率环比变化"
    cashflow: "现金流 (4项): FCF利润率/资本支出强度/FCF/收入比/回购收益率"

  # Walk-Forward 验证结果
  validation:
    wf_sharpe: 1.713
    wf_maxdd: -24.2
    wf_cagr: 34.0
    wf_win_rate: 62.0
    ri_pass_rate: 68.4  # 13/19 窗口通过
    ri_windows_passed: 13
    ri_windows_total: 19

# ── 执行层面 (仓位管理 + 大盘感知) ──
execution:
  # 大盘感知 (VIX + 趋势)
  market_awareness:
    enabled: true
    vix_source: "data/us/vix_10y.parquet"
    # 市场状态定义
    regimes:
      bull:     { vix_max: 20, trend_min: 0.02, position_pct: 1.00 }
      neutral:  { vix_range: [20, 25], position_pct: 0.75 }
      bear:     { vix_min: 25, position_pct: 0.50 }
      extreme_bear: { vix_min: 30, position_pct: 0.25 }

  # 动态仓位策略
  position_sizing:
    strategy: "trend_dynamic"  # fixed / vix_only / trend_only / trend_dynamic
    # 各策略仓位映射
    strategies:
      fixed:        1.00  # 100% 固定仓位
      vix_only:     "根据VIX水平动态调整 (18→100%, 22→90%, 28→70%, 35→50%)"
      trend_only:   "根据200日均线趋势调整"
      trend_dynamic: "综合VIX+趋势 (推荐, MaxDD从-24%降至-17%)"

  # 交易执行参数
  trading:
    max_position_pct: 0.10    # 单只最大仓位
    max_total_exposure: 0.80  # 最大总仓位
    min_order_value: 500      # 最小下单金额
    order_timeout_minutes: 120
    max_slippage_pct: 0.02

# ── 数据源说明 ──
data_sources:
  features:
    name: "V0.4.6 特征文件"
    path: "data/falcon/features_v04_1.parquet"
    rows: 1234580
    columns: 156
    coverage: "2025-2026 覆盖率 98.9%"
    version: "V0.4.6"
    update: "天频 (每日收盘后更新)"

  analyst:
    name: "FMP 分析师预期"
    path: "data/falcon/analyst_historical.json"
    tickers: 476
    coverage: "99% (2001至今)"
    version: "V0.4.6"
    update: "每周"

  fmp_ratios:
    name: "FMP 财务比率"
    path: "data/falcon/fmp_ratios_historical.json"
    version: "V0.4.6"
    update: "季度"

  vix:
    name: "VIX 恐慌指数"
    path: "data/us/vix_10y.parquet"
    version: "V0.4.6"
    update: "天频"

  prices:
    name: "美股日线价格"
    path: "data/falcon/us_prices_daily.parquet"
    version: "V0.4.6"
    update: "天频"

# ── 路径 ──
paths:
  data: "data/falcon"
  models: "models"
  signals: "data/falcon"
  trades: "data/falcon/trades"
  logs: "data/falcon/logs"
  dashboard: "dashboard"
  archive: "archive"
  config: "config"

# ── 自动任务时间表 (由Hermes agent cron管理) ──
cron:
  daily_scoring_and_trade: "30 21 * * 1-5"  # HKT 21:30 = ET 9:30开盘
  alert_checker: "*/5 * * * 1-5"            # 智能告警: 5分钟
  daily_report: "30 4 * * 2-6"              # HKT 04:30 = ET 16:30收盘后
  premarket_plan: "0 21 * * 1-5"            # HKT 21:00 = ET 9:00盘前
  data_check: "0 16 * * 1-5"               # HKT 16:00 = ET 4:00AM
  weekly_review: "0 10 * * 6"              # HKT 10:00 周六
  note: "所有通知通过Hermes cron deliver到Telegram"
